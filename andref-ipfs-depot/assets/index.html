<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IPFS Depot</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <main class="card">
      <h1>Upload to IPFS</h1>
      <p class="hint">This link is single-use and expires after 15 minutes.</p>

      <input type="file" id="file" hidden />
      <button type="button" id="choose">Upload File</button>
      <span id="filename" class="filename"></span>

      <button type="button" id="submit" disabled>Submit</button>

      <div id="status" class="status hidden">
        <span class="spinner"></span>
        <span id="status-text"></span>
      </div>
      <div id="progress-wrap" class="progress hidden">
        <div id="progress-bar" class="progress-bar"></div>
      </div>

      <div id="result" class="result hidden"></div>
    </main>
    <script src="/assets/app.js"></script>
  </body>
</html>
